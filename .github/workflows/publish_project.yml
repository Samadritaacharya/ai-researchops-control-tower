import plotly.express as px

def project_status_chart(df):
    return px.pie(df, names='status', title='Project Status Distribution')

def uncertainty_bubble(df):
    return px.scatter(df, x='goal_volatility', y='data_uncertainty', size='stakeholder_dependency', color='status', hover_name='project_name', title='Goal Volatility vs Data Uncertainty')

def risk_heatmap(df):
    tmp = df.copy(); tmp['risk_score'] = tmp['impact'] * tmp['likelihood']
    return px.density_heatmap(tmp, x='likelihood', y='impact', z='risk_score', histfunc='avg', title='AI/ML Risk Heatmap')

def experiment_bar(df):
    return px.bar(df, x='experiment_name', y=df['actual_metric'].str.rstrip('%').astype(float), color='status', title='Experiment Actual Metrics')
