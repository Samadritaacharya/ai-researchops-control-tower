          files['README.md'] = '''# AI ResearchOps Control Tower

An end-to-end Streamlit portfolio project for managing uncertain AI/ML software-engineering research projects.

## Overview
AI ResearchOps Control Tower demonstrates ResearchOps, technical project management, AI/ML risk awareness, stakeholder coordination, experiment tracking, and research-to-product handover workflows.

## Why I Built This
This independent portfolio project was created for Research Operations / Technical Project Manager roles in AI software-engineering research environments. It is inspired by public software-engineering research themes and is not affiliated with JetBrains or any other organization.

## Key Features
- Dashboard overview with KPIs and visualizations
- Research project intake and charter generation
- Uncertainty and scope matrix
- AI/ML risk register
- Task completeness analyzer
- Stakeholder map and RACI matrix
- ML/AI experiment tracker
- Status, communication, decision log, and product handover readiness generator

## Case Study
The sample case models a Proactive AI Coding Assistant Research Program for an IDE-like developer tool, with tracks for intent detection, suggestion quality, privacy/data assessment, and product handover.

## Tech Stack
Python, Streamlit, Pandas, Plotly, GitHub Issues, and GitHub Actions.

## Installation
```bash
pip install -r requirements.txt
```

## Running the App
```bash
streamlit run app.py
```

## Run Tests
```bash
pip install pytest
pytest tests/
```

## Project Structure
```text
app.py
