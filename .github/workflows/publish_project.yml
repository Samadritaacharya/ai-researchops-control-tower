          files['utils/scoring.py'] = '''"""Scoring functions for ResearchOps project management."""

def calculate_uncertainty_score(goal_volatility, data_uncertainty, model_uncertainty, stakeholder_dependency, legal_complexity):
    return (goal_volatility + data_uncertainty + model_uncertainty + stakeholder_dependency + legal_complexity) / 5

def calculate_task_completeness(task_dict):
    required = ['clear_objective','has_owner','has_output','acceptance_criteria','dependencies','ai_metric','risk_level','timeline','stakeholder_impact']
    complete = 0
    for field in required:
        value = str(task_dict.get(field, '')).strip()
        if value and value.lower() not in {'no','none','nan'}:
            complete += 1
    return round((complete / len(required)) * 100, 2)

def calculate_handover_readiness(evaluation_quality, reproducibility, stakeholder_alignment, risk_closure, documentation_maturity):
    return round(((evaluation_quality + reproducibility + stakeholder_alignment + risk_closure + documentation_maturity) / 5) * 10, 2)

def calculate_risk_score(impact, likelihood):
    return int(impact) * int(likelihood)

def classify_risk(score):
    if score >= 16: return 'High'
    if score >= 8: return 'Medium'
    return 'Low'
